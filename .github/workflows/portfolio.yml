name: Daily Portfolio Tracker

on:
  schedule:
    - cron: '35 1 * * *'   # 7:05 AM IST (UTC+5:30) = 01:35 UTC
  workflow_dispatch:         # allow manual runs

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Create email config from secrets
        run: |
          echo '{"smtp_user": "${{ secrets.GMAIL_USER }}", "smtp_pass": "${{ secrets.GMAIL_PASS }}", "to": "${{ secrets.GMAIL_TO }}"}' > email_config.json

      - name: Run portfolio tracker
        run: python portfolio_tracker.py
